# Optional: POST to Vercel Deploy Hook on every push to `main`.
# Secret: GitHub repo → Settings → Actions → `VERCEL_DEPLOY_HOOK_URL` (hook URL from Vercel → Settings → Git → Deploy Hooks, branch `main`).

name: Vercel deploy hook (main)

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  trigger-vercel:
    runs-on: ubuntu-latest
    steps:
      - name: POST Deploy Hook
        env:
          HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${HOOK_URL:-}" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL unset — skip."
            exit 0
          fi
          curl -fsSL -X POST "${HOOK_URL}"
          echo "Hook POST done."
